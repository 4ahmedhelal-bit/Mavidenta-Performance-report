* { box-sizing: border-box; margin: 0; padding: 0; }

.ctrl { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
.presets { display: flex; gap: 6px; flex-wrap: wrap; }
.presets button { font-family: inherit; font-size: 13px; padding: 6px 12px; border-radius: 20px; border: 1px solid #DAD8D0; background: #fff; color: #444; cursor: pointer; }
.presets button.on { background: #1f2a44; color: #fff; border-color: #1f2a44; }
.range { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #6b7280; }

.note { font-size: 12px; color: #8a8a80; margin: 10px 0 18px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
@media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
.card { background: #fff; border: 1px solid #EAE8E1; border-radius: 16px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.sumcard { grid-column: 1 / -1; background: #1f2a44; border: none; color: #fff; }
.sumcard .lang { color: #fff; }
.sumgrid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-top: 14px; }

.sumbox { background: rgba(255,255,255,.08); border-radius: 12px; padding: 12px 14px; }
.sumbox .sl { font-size: 12px; color: #b8c0d4; }
.sumbox .sv { font-size: 22px; font-weight: 700; margin-top: 2px; }
.sumbud { margin-top: 14px; }
.sumbud .track { background: rgba(255,255,255,.15); }
.crow { display: flex; align-items: center; justify-content: space-between; }
.lang { font-size: 17px; font-weight: 700; }
.badge { font-size: 12px; padding: 4px 11px; border-radius: 20px; font-weight: 600; }
.badge.active { background: #E1F3E8; color: #1B7A3D; }
.budline { display: flex; justify-content: space-between; font-size: 13px; color: #6b7280; margin: 16px 0 7px; }
.budline b { font-size: 15px; font-weight: 700; color: #1f2937; }
.track { background: #ECEAE4; border-radius: 20px; height: 10px; overflow: hidden; }
.fill { height: 100%; border-radius: 20px; }
.cap { font-size: 12px; color: #a3a29a; text-align: left; margin-top: 5px; }
.sumcap { color: #b8c0d4; }
.plabel { font-size: 12px; color: #8a8a80; text-align: right; margin: 16px 0 8px; }
.plats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
.pbox { background: #F5F4F0; border-radius: 12px; padding: 10px 6px; text-align: center; }
.pbox.soon { opacity: .55; }
.pbox .pn { font-size: 12px; color: #8a8a80; }
.pbox .pv { font-size: 19px; font-weight: 700; margin: 1px 0; }
.pbox .pc { font-size: 12px; font-weight: 600; min-height: 15px; }
.pbox .ps { font-size: 11px; color: #a3a29a; border-top: 1px solid #E5E3DC; padding-top: 5px; margin-top: 6px; }
.up { color: #15803d; } .down { color: #b91c1c; } .muted { color: #a3a29a; }
.total { display: flex; align-items: center; justify-content: space-between; background: #E8F0FE; border-radius: 12px; padding: 12px 14px; margin-top: 16px; }
.total .tl { font-size: 13px; color: #1B4C9B; font-weight: 600; }
.total .tv { font-size: 22px; font-weight: 700; color: #1B4C9B; }
.daily { border-top: 1px solid #EAE8E1; margin-top: 16px; padding-top: 13px; }
.drow { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
.drow .dl { font-size: 13px; color: #6b7280; }
.dmain { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
.dmain .dv { font-size: 23px; font-weight: 700; }
.dmain .dt { font-size: 13px; color: #a3a29a; }
.pill { margin-inline-start: auto; font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
.pill.ok { background: #E1F3E8; color: #1B7A3D; }
.pill.bad { background: #FBE7E7; color: #b91c1c; }

      <div class="sumbox"><div class="sl">إجمالي الليدز</div><div class="sv">${pLeads}</div></div>
      <div class="sumbox"><div class="sl">صرف الفترة ₺</div><div class="sv">${num(pSpend)}</div></div>
      <div class="sumbox"><div class="sl">التارجيت</div><div class="sv">${pt} <span style="font-size:13px;color:${ok?'#7ee2a8':'#f2a6a6'}">${pct}%</span></div></div>
      <div class="sumbox"><div class="sl">إجمالي الميزانية ₺</div><div class="sv">${num(budget)}</div></div>
    </div>
    <div class="sumbud">
      <div class="budline" style="color:#b8c0d4"><span>المصروف الشهري <b style="color:#fff">${num(mSpend)}</b></span><span>المتبقي <b style="color:${warn?'#f2b06a':'#7ee2a8'}">${num(rem)}</b></span></div>
      <div class="track"><div class="fill" style="width:${Math.min(bpct,100)}%;background:${warn?'#E0972F':'#4E7CD1'}"></div></div>
      <div class="cap sumcap">${bpct}% من إجمالي الميزانية الشهرية</div>
    </div>
  </div>`;
}
const grid = document.getElementById("grid");
const fromEl = document.getElementById("from"), toEl = document.getElementById("to");
fromEl.min = toEl.min = MIN; fromEl.max = toEl.max = MAX;

function render(a, b){
  if (a < MIN) a = MIN; if (b > MAX) b = MAX;
  fromEl.value = a; toEl.value = b;
  const ds = inRange(a,b), days = ds.length||1;
  const agg = sumDates(ds);
  const before = DATES.filter(d => d < a);
  const prevDs = before.slice(-days), prevDays = prevDs.length;
  const prev = sumDates(prevDs);
  grid.innerHTML = summaryCard(agg, days) + LANGS.map(L => card(L, agg, prev, days, prevDays)).join("");
}
function shift(dateStr, n){ const d=new Date(dateStr+"T00:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function applyPreset(p){
  document.querySelectorAll("#presets button").forEach(b=>b.classList.toggle("on", b.dataset.p===p));
  if (p==="today") render(MAX, MAX);
  else if (p==="yest"){ const y=shift(MAX,-1); render(y,y); }
  else if (p==="last7") render(shift(MAX,-6), MAX);
  else if (p==="this") render(CURMONTH+"-01", MAX);
  else if (p==="last"){ const lm=shift(CURMONTH+"-01",-1).slice(0,7); render(lm+"-01", lm+"-28"); }
}
document.querySelectorAll("#presets button").forEach(b => b.addEventListener("click", () => applyPreset(b.dataset.p)));
function manual(){ document.querySelectorAll("#presets button").forEach(b=>b.classList.remove("on")); render(fromEl.value, toEl.value); }
fromEl.addEventListener("change", manual); toEl.addEventListener("change", manual);
applyPreset("last7");
</script>
</body>
